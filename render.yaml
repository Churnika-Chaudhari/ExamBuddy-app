# Render Blueprint — deploy at https://dashboard.render.com/blueprints
# Connect your GitHub repo, then set secret env vars in the Render dashboard.
services:
  - type: web
    name: smartstudy-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: smartstudy
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
